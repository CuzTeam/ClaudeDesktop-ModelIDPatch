name: Auto-Adapt New Versions

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-and-adapt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install 7z
        run: sudo apt-get install -y p7zip-full

      - name: Run auto-adapt
        id: adapt
        run: python ci/auto_adapt.py --definitions patch-definitions.json

      - name: Create Issue for new version
        if: steps.adapt.outputs.status == 'adapted' || steps.adapt.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.adapt.outputs.status }}';
            const version = '${{ steps.adapt.outputs.version }}';
            const funcName = '${{ steps.adapt.outputs.function_name }}';

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-adapt',
            });
            const existing = issues.data.find(i => i.title.includes(version));
            if (existing) {
              console.log(`Issue already exists: #${existing.number}`);
              return;
            }

            if (status === 'adapted') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `New version ${version} detected and auto-adapted`,
                body: `Claude Desktop **${version}** has been released.\n\nAuto-adaptation succeeded:\n- Function name: \`${funcName}\`\n- PR will be created automatically.\n\nPlease verify the patch works correctly.`,
                labels: ['auto-adapt', 'auto-adapted'],
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `New version ${version} detected — auto-adaptation FAILED`,
                body: `Claude Desktop **${version}** has been released but auto-adaptation failed.\n\nThe matching algorithm could not find the patch target. Manual investigation is needed.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
                labels: ['auto-adapt', 'needs-manual-review'],
              });
            }

      - name: Push branch for adapted version
        id: push-branch
        if: steps.adapt.outputs.status == 'adapted'
        run: |
          VERSION="${{ steps.adapt.outputs.version }}"
          BRANCH="auto/adapt-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If remote branch already exists, delete it first (stale from a previous failed run)
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH"
          fi

          git checkout -b "$BRANCH"
          git add patch-definitions.json
          git commit -m "Add patch definition for Claude Desktop ${VERSION}"
          git push -u origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create PR for adapted version
        if: steps.adapt.outputs.status == 'adapted'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.push-branch.outputs.branch }}';
            const version = '${{ steps.adapt.outputs.version }}';
            const funcName = '${{ steps.adapt.outputs.function_name }}';

            // Check if PR already exists
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.length > 0) {
              console.log(`PR #${prs[0].number} already exists for ${branch}`);
              return;
            }

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add patch definition for Claude Desktop ${version}`,
              head: branch,
              base: 'main',
              body: `Automatically detected and adapted for Claude Desktop **${version}**.\n\n## Changes\n- Updated \`patch-definitions.json\` with new function name: \`${funcName}\`\n\n## Verification\n- [ ] Run \`scripts/patch.ps1\` on Windows with version ${version}\n- [ ] Confirm Claude Desktop accepts non-Anthropic model names after patch\n\n_Auto-generated by [auto-adapt workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
            });
